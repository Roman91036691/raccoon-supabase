<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raccoon Coin Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --yellow: #fde047; --gold: #fbbf24; --crit: #ff3b30; 
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15);
            --neon: 0 0 15px rgba(253, 224, 71, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: radial-gradient(circle at top, #1e1e1e 0%, #000 100%); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* HEADER */
        .header-tools { position: absolute; top: 25px; right: 20px; display: flex; gap: 15px; align-items: center; z-index: 100; }
        .header-btn { width: 36px; height: 36px; cursor: pointer; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); transition: 0.2s; }
        #username { margin-top: 25px; padding-left: 25px; opacity: 0.8; font-size: 14px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}

        /* PUSH NOTIFICATIONS */
        .push-container { position: fixed; top: 20px; left: 15px; right: 15px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .push-note { 
            pointer-events: auto; padding: 18px; border-radius: 20px; 
            background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border); color: #fff; font-weight: 600; font-size: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); transform: translateY(-30px); opacity: 0;
            transition: transform 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.27), opacity 0.3s;
            position: relative; touch-action: pan-x;
        }
        .push-note.show { transform: translateY(0); opacity: 1; }
        .push-note.swipe-left { transform: translateX(-120%) rotate(-10deg); opacity: 0; }
        .push-note.swipe-right { transform: translateX(120%) rotate(10deg); opacity: 0; }

        /* NAV */
        nav { position: absolute; bottom: 15px; left: 12px; right: 12px; height: 70px; background: rgba(10, 10, 10, 0.85); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(20px); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        .nav-grid { display: flex; height: 100%; position: relative; align-items: center; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.4; transition: 0.3s; z-index: 2; height: 100%; cursor: pointer;}
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .nav-item img { width: 26px; height: 26px; }
        .capsule { position: absolute; width: 20%; height: 50px; background: rgba(253, 224, 71, 0.1); border: 1.5px solid var(--yellow); border-radius: 18px; transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: var(--neon); pointer-events: none; left: 0;}

        /* PAGES */
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; scrollbar-width: none; }
        .page { display: none; flex-direction: column; padding: 25px; animation: pageFade 0.3s ease-out; }
        .page.active { display: flex; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #score { font-size: 60px; font-weight: 900; color: var(--yellow); text-align: center; margin: 30px 0 5px; text-shadow: 0 0 25px rgba(253,224,71,0.4); }

        .coin-box { flex: 1; display: flex; align-items: center; justify-content: center; }
        .coin-img { width: 70vw; max-width: 280px; transition: transform 0.05s; cursor: pointer; filter: drop-shadow(0 0 30px rgba(253,224,71,0.1)); }
        .coin-img:active { transform: scale(0.92); }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .btn-ui { background: linear-gradient(135deg, var(--yellow), var(--gold)); color: #000; border: none; padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-ui:active { transform: scale(0.96); }
        .btn-ui:disabled { background: #333; color: #666; cursor: default; }
        .input-ui { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; text-align: center; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; backdrop-filter: blur(15px);}
        .top-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: var(--glass); border-radius: 18px; margin-bottom: 8px; }
        .friend-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); }

        .bar-container { background: rgba(0,0,0,0.4); height: 10px; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid var(--border); }
        #bar-fill { height: 100%; background: var(--yellow); box-shadow: 0 0 10px var(--yellow); transition: width 0.3s; }

        .tap-pop { position: fixed; pointer-events: none; font-weight: 900; font-size: 32px; z-index: 6000; animation: tapFloat 0.7s ease-out forwards; }
        @keyframes tapFloat { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -40px) scale(1.1); } 100% { opacity: 0; transform: translate(-50%, -120px) scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <div id="push-box" class="push-container"></div>

    <div class="header-tools">
        <img src="https://i.ibb.co/Vp2DCFMK/ticket-1f3ab.png" class="header-btn" onclick="openPromo()">
        <img src="https://i.ibb.co/dwcQhshq/top-arrow-1f51d.png" class="header-btn" onclick="openTop()">
        <div onclick="openBonus()" style="position:relative; font-size:30px;">
            🎁 <small id="b-limit" style="position:absolute; top:-5px; right:-5px; background:var(--crit); color:white; font-size:10px; padding:2px 5px; border-radius:10px; border:1px solid #000;">3</small>
        </div>
    </div>

    <div class="content">
        <div class="page active" id="p0">
            <div id="username">ЗАВАНТАЖЕННЯ...</div>
            <div id="score">0</div>
            <div class="coin-box"><img id="coin" class="coin-img" src="https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png"></div>
            <div class="card" style="margin-top: auto;">
                <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:bold; color: var(--yellow);">
                    <span>ЕНЕРГІЯ</span> <span id="energy-txt">1000/1000</span>
                </div>
                <div class="bar-container"><div id="bar-fill" style="width:100%;"></div></div>
            </div>
        </div>

        <div class="page" id="p1">
            <h1 style="margin-bottom:20px;">Магазин</h1>
            <div id="shop-list"></div>
        </div>

        <div class="page" id="p2">
            <h1 style="margin-bottom:20px;">Команда</h1>
            <div class="card" style="text-align:center;">
                <h3 style="color:var(--yellow); margin-bottom:10px;">Запроси друзів</h3>
                <p style="opacity:0.7; margin-bottom:15px; font-size: 14px;">+10,000 монет тобі та другу!</p>
                <button class="btn-ui" onclick="inviteFriend()">🚀 ВІДПРАВИТИ ПОСИЛАННЯ</button>
            </div>
            <h3 style="margin: 15px 0;">Твої реферали (<span id="friends-count">0</span>)</h3>
            <div id="friends-list"></div>
        </div>

        <div class="page" id="p3">
            <h1 style="margin-bottom:20px;">Квести</h1>
            <div id="quest-list"></div>
        </div>

        <div class="page" id="p4">
            <h1 style="margin-bottom:20px;">Профіль</h1>
            <div id="stat-list"></div>
        </div>
    </div>

    <nav>
        <div class="nav-grid">
            <div id="capsule" class="capsule"></div>
            <div class="nav-item active" onclick="nav(0)"><img src="https://i.ibb.co/chM9Ftgt/retouch-2026031610215594.png"></div>
            <div class="nav-item" onclick="nav(1)"><img src="https://i.ibb.co/xtM6BCyd/shopping-cart-1f6d2.png"></div>
            <div class="nav-item" onclick="nav(2)"><img src="https://i.ibb.co/mCWNRzgf/busts-in-silhouette-1f465.png"></div>
            <div class="nav-item" onclick="nav(3)"><img src="https://i.ibb.co/6ctcw0gn/trophy-1f3c6.png"></div>
            <div class="nav-item" onclick="nav(4)"><img src="https://i.ibb.co/wrZK79M8/bar-chart-1f4ca.png"></div>
        </div>
    </nav>
</div>

<div id="promo-modal" class="modal" style="justify-content:center;">
    <div class="card" style="text-align:center;">
        <h2 style="color:var(--yellow); margin-bottom:20px;">ПРОМОКОД</h2>
        <input type="text" id="promo-input" class="input-ui" placeholder="ВВЕДІТЬ КОД">
        <button class="btn-ui" onclick="checkPromo()">АКТИВУВАТИ</button>
        <p onclick="document.getElementById('promo-modal').style.display='none'" style="margin-top:20px; opacity:0.5;">Закрити</p>
    </div>
</div>

<div id="top-modal" class="modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2>🏆 ТОП ГРАВЦІВ</h2>
        <span onclick="document.getElementById('top-modal').style.display='none'" style="font-size:24px;">✕</span>
    </div>
    <div id="top-content" style="overflow-y:auto;"></div>
</div>

<div id="bonus-win" class="modal" style="justify-content:center; align-items:center; text-align:center;">
    <div id="b-ready">
        <h1 style="font-size:50px; color:var(--yellow);">БОНУС x10!</h1>
        <p style="margin: 20px 0 40px; opacity:0.8;">Ти готовий клікати 7.5 сек?</p>
        <button class="btn-ui" onclick="startBonusNow()" style="width:200px;">🔥 ПОЇХАЛИ</button>
    </div>
    <div id="b-active" style="display:none;">
        <div id="b-timer" style="font-size:80px; font-weight:900; color:var(--yellow);">7.5</div>
        <div id="b-clicks" style="font-size:24px; margin-top:10px;">КЛІКИ: 0</div>
        <div id="bonus-click-zone" style="position:fixed; inset:0; z-index:100;"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://ohyagfbgaekifqrxvvks.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oeWFnZmJnYWVraWZxcnh2dmtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc2MzIsImV4cCI6MjA4OTUwMzYzMn0.VJhJcN3RaeJdZVsLKGU3NjLvCCdNTR5TA_Sp6jj1WKM';
    const db = supabase.createClient(SB_URL, SB_KEY);

    let tg = window.Telegram.WebApp;
    let userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_" + Math.floor(Math.random()*1000);
    let userName = (tg.initDataUnsafe?.user?.first_name || "Гравець").toUpperCase();
    let startParam = tg.initDataUnsafe?.start_param || null;

    let state = {
        score: 0, energy: 1000, max: 1000, power: 1, 
        totalEarned: 0, totalClicks: 0, totalSpent: 0,
        bonusLimit: 3, lastBonusDate: "",
        lvls: { tap: 1, energy: 1, bot: 0 },
        doneQuests: [], usedPromos: [], ref_by: null
    };

    let isB = false, bc = 0, bInterval, bActive = false;

    // СИСТЕМА PUSH
    function showPush(text) {
        const box = document.getElementById('push-box');
        const note = document.createElement('div');
        note.className = 'push-note';
        note.innerText = text;
        box.appendChild(note);
        setTimeout(() => note.classList.add('show'), 50);

        let startX = 0;
        note.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
        note.addEventListener('touchmove', (e) => {
            let move = e.touches[0].clientX - startX;
            if (Math.abs(move) > 20) {
                note.style.transform = `translateX(${move}px)`;
                note.style.opacity = 1 - Math.abs(move)/200;
            }
        });
        note.addEventListener('touchend', (e) => {
            let move = e.changedTouches[0].clientX - startX;
            if (Math.abs(move) > 80) {
                note.classList.add(move > 0 ? 'swipe-right' : 'swipe-left');
                setTimeout(() => note.remove(), 300);
            } else { note.style.transform = ''; note.style.opacity = ''; }
        });
        setTimeout(() => { if(note.parentNode) { note.classList.remove('show'); setTimeout(()=>note.remove(), 400); } }, 4000);
    }

    // ЗАВАНТАЖЕННЯ ДАНИХ (РЕАЛЬНІ РЕФЕРАЛИ)
    async function loadData() {
        document.getElementById('username').innerText = userName;
        
        let { data: player } = await db.from('players').select('*').eq('id', userId).maybeSingle();
        
        if (!player) {
            if (startParam && startParam !== userId) {
                state.ref_by = startParam;
                // Бонус рефереру
                const { data: refObj } = await db.from('players').select('state').eq('id', startParam).maybeSingle();
                if (refObj) {
                    let rs = refObj.state; rs.score += 10000; rs.totalEarned += 10000;
                    await db.from('players').update({ state: rs, score_top: rs.score }).eq('id', startParam);
                }
                state.score = 10000; state.totalEarned = 10000;
                showPush("🎁 Вітаємо! +10,000 за запрошення!");
            }
            await saveData();
        } else {
            state = { ...state, ...player.state };
        }

        // Реальні друзі з бази
        const { data: friends } = await db.from('players').select('username').eq('ref_by', userId);
        let friendsListUI = friends || [];
        document.getElementById('friends-count').innerText = friendsListUI.length;
        document.getElementById('friends-list').innerHTML = friendsListUI.length ? friendsListUI.map(f => `
            <div class="friend-item">
                <div style="width:35px; height:35px; border-radius:50%; background:var(--yellow); color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold;">${f.username[0]}</div>
                <b>${f.username}</b>
                <span style="margin-left:auto; color:var(--yellow); font-size:12px;">+10,000</span>
            </div>
        `).join('') : `<p style="text-align:center; opacity:0.4; padding:20px;">Поки що нікого немає...</p>`;

        updateUI();
    }

    async function saveData() {
        const s = { ...state };
        s.score = Number(s.score) || 0;
        await db.from('players').upsert({
            id: userId, username: userName, state: s, score_top: Math.floor(s.score), ref_by: s.ref_by
        });
    }

    function updateUI() {
        const today = new Date().toLocaleDateString();
        if(state.lastBonusDate !== today) { state.bonusLimit = 3; state.lastBonusDate = today; }

        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-txt').innerText = `${state.energy}/${state.max}`;
        document.getElementById('bar-fill').style.width = (state.energy/state.max)*100 + "%";
        document.getElementById('b-limit').innerText = state.bonusLimit;

        const items = [{id:'tap', n:'Сила тапу', b:150}, {id:'energy', n:'Макс. енергія', b:250}, {id:'bot', n:'Авто-Бот', b:2000}];
        document.getElementById('shop-list').innerHTML = items.map(i => {
            const cost = Math.floor(i.b * Math.pow(1.6, state.lvls[i.id]));
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${i.n}</b><br><small>Рівень ${state.lvls[i.id]}</small></div>
                <button class="btn-ui" style="width:auto; padding:10px 20px;" onclick="buy('${i.id}', ${cost})" ${state.score<cost?'disabled':''}>💰 ${cost}</button>
            </div>`;
        }).join('');

        const quests = [
            {n:'Клікер (1к)', c:()=>state.totalClicks>=1000, r:5000},
            {n:'Багатій (100к)', c:()=>state.score>=100000, r:15000}
        ];
        document.getElementById('quest-list').innerHTML = quests.map(q => `
            <div class="card" style="display:flex; justify-content:space-between; opacity:${q.c()?1:0.5};">
                <span>${q.n}</span>
                <b>${q.c() ? '✅' : '🔒'} +${q.r}</b>
            </div>
        `).join('');

        const stats = [["Всього зароблено", state.totalEarned], ["Всього кліків", state.totalClicks], ["Сила тапу", state.power]];
        document.getElementById('stat-list').innerHTML = stats.map(s => `<div class="card" style="display:flex; justify-content:space-between;"><span>${s[0]}</span><b>${s[1]}</b></div>`).join('');
    }

    function handleTap(e) {
        if(isB || state.energy < 1) return;
        if(e.type === 'touchstart') e.preventDefault();
        const pts = e.touches ? Array.from(e.touches) : [{clientX:e.clientX, clientY:e.clientY}];
        pts.forEach(p => {
            state.score += state.power; state.totalEarned += state.power; state.totalClicks++; state.energy--;
            showPop(p.clientX, p.clientY, `+${state.power}`);
        });
        updateUI();
    }

    function showPop(x, y, txt, isX) {
        const d = document.createElement('div');
        d.className = 'tap-pop'; d.innerText = txt;
        if(isX) { d.style.color = "var(--yellow)"; d.style.fontSize = "40px"; d.style.zIndex = "3000"; }
        d.style.left = x + 'px'; d.style.top = y + 'px';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 700);
    }

    function buy(id, cost) {
        if(state.score >= cost) {
            state.score -= cost; state.totalSpent += cost; state.lvls[id]++;
            if(id==='tap') state.power++; if(id==='energy') state.max+=500;
            updateUI(); saveData(); showPush("🛒 Покупка успішна!");
        }
    }

    function inviteFriend() {
        const link = `https://t.me/raccoon_coin_tap_bot/RACCOON_TAP_APP?startapp=${userId}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=🚀 Грай зі мною та отримуй бонуси!`);
    }

    // БОНУС
    function openBonus() { if(state.bonusLimit > 0) document.getElementById('bonus-win').style.display='flex'; }
    function startBonusNow() {
        if(bActive) return; bActive = true; isB = true; bc = 0;
        document.getElementById('b-ready').style.display='none';
        document.getElementById('b-active').style.display='block';
        let start = performance.now();
        bInterval = setInterval(() => {
            let left = Math.max(0, 7.5 - (performance.now()-start)/1000);
            document.getElementById('b-timer').innerText = left.toFixed(1);
            if(left <= 0) { clearInterval(bInterval); finishBonus(); }
        }, 50);
    }
    function finishBonus() {
        bActive = false; isB = false;
        let win = bc * state.power * 10;
        state.score += win; state.totalEarned += win; state.bonusLimit--;
        document.getElementById('bonus-win').style.display='none';
        document.getElementById('b-ready').style.display='block';
        document.getElementById('b-active').style.display='none';
        updateUI(); saveData();
        showPush(`🔥 Бонус завершено! Отримано: ${win.toLocaleString()}`);
    }

    async function openTop() {
        document.getElementById('top-modal').style.display = 'flex';
        const { data } = await db.from('players').select('username, score_top').order('score_top', {ascending:false}).limit(10);
        document.getElementById('top-content').innerHTML = data.map((p, i) => `
            <div class="top-item"><span>#${i+1}</span><b>${p.username}</b><span style="margin-left:auto; color:var(--yellow)">${p.score_top.toLocaleString()}</span></div>
        `).join('');
    }

    function checkPromo() {
        if(document.getElementById('promo-input').value === "B3RDO$") {
            state.score += 5000; updateUI(); saveData();
            document.getElementById('promo-modal').style.display='none';
            showPush("💎 Промокод прийнято! +5000");
        }
    }

    function nav(idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`p${idx}`).classList.add('active');
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
        document.getElementById('capsule').style.left = (idx*20) + "%";
    }

    document.getElementById('coin').addEventListener('touchstart', handleTap, {passive:false});
    document.getElementById('bonus-click-zone').addEventListener('touchstart', (e) => {
        if(!isB) return; e.preventDefault(); bc++;
        document.getElementById('b-clicks').innerText = `КЛІКИ: ${bc}`;
        showPop(e.touches[0].clientX, e.touches[0].clientY, "x10", true);
    }, {passive:false});

    setInterval(() => {
        if(state.energy < state.max) state.energy = Math.min(state.max, state.energy + 2);
        if(state.lvls.bot > 0) { state.score += state.lvls.bot; state.totalEarned += state.lvls.bot; }
        updateUI();
    }, 1000);
    setInterval(saveData, 15000);

    loadData();
    tg.expand();
</script>
</body>
</html>
