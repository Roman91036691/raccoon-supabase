<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raccoon Coin Achievements</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --yellow: #fde047; 
            --gold: #fbbf24;
            --crit: #ff3b30; 
            --glass: rgba(255, 255, 255, 0.08); 
            --border: rgba(255, 255, 255, 0.15);
            --neon: 0 0 15px rgba(253, 224, 71, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: radial-gradient(circle at top, #1e1e1e 0%, #000 100%); 
            color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; 
        }

        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* HEADER */
        .header-tools { position: absolute; top: 25px; right: 20px; display: flex; gap: 12px; align-items: center; z-index: 100; }
        .header-btn { width: 40px; height: 40px; cursor: pointer; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); transition: 0.2s; }
        .header-btn:active { transform: scale(0.9); }
        
        #username { margin-top: 25px; padding-left: 25px; opacity: 0.8; font-size: 14px; font-weight: 700; text-align: left; }

        /* NAV & CAPSULE */
        nav { 
            position: absolute; bottom: 15px; left: 12px; right: 12px; 
            height: 70px; background: rgba(10, 10, 10, 0.85); 
            border: 1px solid var(--border); border-radius: 24px;
            backdrop-filter: blur(20px); z-index: 1000; 
        }
        .nav-grid { display: flex; height: 100%; position: relative; align-items: center; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.4; transition: 0.3s; z-index: 2; position: relative; height: 100%; cursor: pointer;}
        .nav-item.active { opacity: 1; transform: translateY(-3px); }
        .nav-item img { width: 26px; height: 26px; }
        
        .capsule { 
            position: absolute; width: 20%; height: 50px; 
            background: rgba(255, 255, 255, 0.05); border: 1.5px solid var(--yellow);
            border-radius: 18px; transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--neon); pointer-events: none; left: 0;
        }

        /* PAGES */
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; scrollbar-width: none; }
        .page { display: none; flex-direction: column; padding: 25px; animation: pageFade 0.3s ease; }
        .page.active { display: flex; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #score { font-size: 58px; font-weight: 900; color: var(--yellow); text-align: center; margin: 30px 0 10px; text-shadow: 0 0 20px rgba(253,224,71,0.3); }

        .coin-box { flex: 1; display: flex; align-items: center; justify-content: center; }
        .coin-img { width: 75vw; max-width: 280px; transition: transform 0.05s; filter: drop-shadow(0 0 30px rgba(253,224,71,0.1)); cursor: pointer; }
        .coin-img:active { transform: scale(0.92); }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .btn-ui { background: var(--yellow); color: #000; border: none; padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; }
        .btn-ui:disabled { background: #333 !important; color: #666 !important; }

        /* INPUTS */
        .input-ui { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; text-align: center; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; backdrop-filter: blur(15px);}
        
        .bar-container { background: rgba(0,0,0,0.4); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid var(--border); }
        #bar-fill { height: 100%; background: var(--yellow); transition: width 0.2s; }

        .tap-pop { position: fixed; pointer-events: none; font-weight: 900; font-size: 32px; z-index: 6000; animation: tapFloat 0.7s forwards; }
        @keyframes tapFloat { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

<div id="app">
    <div class="header-tools">
        <img src="https://i.ibb.co/Vp2DCFMK/ticket-1f3ab.png" class="header-btn" onclick="openPromo()">
        <img src="https://i.ibb.co/dwcQhshq/top-arrow-1f51d.png" class="header-btn" onclick="openTop()">
        <div onclick="openBonus()" style="font-size:32px; cursor:pointer; position:relative;">
            🎁 <small id="b-limit" style="position:absolute; top:-5px; right:-5px; background:var(--crit); font-size:10px; padding:2px 5px; border-radius:10px;">3</small>
        </div>
    </div>

    <div class="content">
        <div class="page active" id="p0">
            <div id="username">ЗАВАНТАЖЕННЯ...</div>
            <div id="score">0</div>
            <div class="coin-box"><img id="coin" class="coin-img" src="https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png"></div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:900;">
                    <span>⚡ ЕНЕРГІЯ</span> <span id="energy-txt">1000/1000</span>
                </div>
                <div class="bar-container"><div id="bar-fill" style="width:100%;"></div></div>
            </div>
        </div>

        <div class="page" id="p1"><h1>Магазин</h1><div id="shop-list" style="margin-top:20px;"></div></div>

        <div class="page" id="p2"><h1>Команда</h1><div id="friends-list" style="margin-top:20px;"></div></div>

        <div class="page" id="p3">
            <h1>Досягнення</h1>
            <p style="opacity:0.5; margin-bottom:20px;">Грай та отримуй бонуси</p>
            <div id="quest-list"></div>
        </div>

        <div class="page" id="p4"><h1>Статистика</h1><div id="stat-list" style="margin-top:20px;"></div></div>
    </div>

    <nav>
        <div class="nav-grid">
            <div id="capsule" class="capsule"></div>
            <div class="nav-item active" onclick="nav(0)"><img src="https://i.ibb.co/chM9Ftgt/retouch-2026031610215594.png"></div>
            <div class="nav-item" onclick="nav(1)"><img src="https://i.ibb.co/xtM6BCyd/shopping-cart-1f6d2.png"></div>
            <div class="nav-item" onclick="nav(2)"><img src="https://i.ibb.co/mCWNRzgf/busts-in-silhouette-1f465.png"></div>
            <div class="nav-item" onclick="nav(3)"><img src="https://i.ibb.co/6ctcw0gn/trophy-1f3c6.png"></div>
            <div class="nav-item" onclick="nav(4)"><img src="https://i.ibb.co/wrZK79M8/bar-chart-1f4ca.png"></div>
        </div>
    </nav>
</div>

<div id="promo-modal" class="modal" style="justify-content:center; align-items:center;">
    <div class="card" style="width:100%; text-align:center;">
        <h2 style="margin-bottom:20px; color:var(--yellow);">ПРОМОКОД</h2>
        <input type="text" id="promo-input" class="input-ui" placeholder="Введіть код...">
        <button class="btn-ui" onclick="checkPromo()" style="width:100%;">АКТИВУВАТИ</button>
        <p onclick="closePromo()" style="margin-top:20px; opacity:0.5; cursor:pointer;">Закрити</p>
    </div>
</div>

<div id="top-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>ТОП ГРАВЦІВ</h2><b onclick="closeTop()" style="cursor:pointer;">✕</b>
    </div>
    <div id="top-content"></div>
</div>

<div id="bonus-win" class="modal" style="justify-content:center; align-items:center;">
    <div id="b-ready" style="text-align:center;">
        <h1 style="color:var(--yellow); font-size:40px;">БОНУС x10!</h1>
        <button class="btn-ui" onclick="startBonusNow()" style="margin-top:30px; width:180px;">ПОЧАТИ</button>
    </div>
    <div id="b-active" style="display:none; text-align:center;">
        <div id="b-timer" style="font-size:80px; color:var(--yellow); font-weight:900;">7.5</div>
        <div id="bonus-click-zone" style="position:fixed; inset:0;"></div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let userId = tg.initDataUnsafe?.user?.id || "dev_test";
    
    let state = {
        score: 0, energy: 1000, max: 1000, power: 1, 
        totalClicks: 0, totalSpent: 0, botLvl: 0, 
        critChance: 0.05, // 5% стандарт
        bonusLimit: 3, lastUpdate: Date.now(),
        lvls: { tap: 1, energy: 1, bot: 0 },
        doneQuests: [], usedPromos: []
    };

    // ІГРОВІ КВЕСТИ (ДОСЯГНЕННЯ)
    const achievements = [
        { id: 'c100', n: 'Перша сотня кліків', b: 500, check: (s) => s.totalClicks >= 100 },
        { id: 'c1000', n: 'Майстер тапу (1000 кліків)', b: 5000, check: (s) => s.totalClicks >= 1000 },
        { id: 's5000', n: 'Інвестор (витрачено 5к)', b: 2000, check: (s) => s.totalSpent >= 5000 },
        { id: 'l5', n: 'Силач (тапу 5 рівня)', b: 3000, check: (s) => s.lvls.tap >= 5 },
        { id: 'b1', n: 'Власник бота', b: 1000, check: (s) => s.lvls.bot >= 1 },
        { id: 'e2000', n: 'Енерджайзер (2к енергії)', b: 4000, check: (s) => s.max >= 2000 },
        { id: 'c5000', n: 'Легендарний клікер', b: 25000, check: (s) => s.totalClicks >= 5000 },
        { id: 's50000', n: 'Мільйонер', b: 50000, check: (s) => s.score >= 1000000 }
    ];

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-txt').innerText = `${Math.floor(state.energy)}/${state.max}`;
        document.getElementById('bar-fill').style.width = (state.energy/state.max)*100 + "%";
        document.getElementById('username').innerText = (tg.initDataUnsafe?.user?.first_name || "ГРАВЕЦЬ").toUpperCase();

        // Рендер квестів (авто-перевірка)
        document.getElementById('quest-list').innerHTML = achievements.map(a => {
            const isDone = state.doneQuests.includes(a.id);
            const canClaim = a.check(state) && !isDone;
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center; opacity:${isDone?0.5:1}">
                <div><b>${a.n}</b><br><small style="color:var(--yellow)">+${a.b}</small></div>
                <button class="btn-ui" onclick="claimAchive('${a.id}', ${a.b})" ${!canClaim?'disabled':''} style="font-size:12px;">
                    ${isDone?'ВИКОНАНО':canClaim?'ОТРИМАТИ':'В ПРОЦЕСІ'}
                </button>
            </div>`;
        }).join('');

        // Рендер магазину
        const shops = [{id:'tap',n:'Сила тапу',b:100},{id:'energy',n:'Енергія',b:200},{id:'bot',n:'Авто-бот',b:1500}];
        document.getElementById('shop-list').innerHTML = shops.map(i => {
            const cost = Math.floor(i.b * Math.pow(1.6, state.lvls[i.id]));
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${i.n}</b><br><small>Lvl ${state.lvls[i.id]}</small></div>
                <button class="btn-ui" onclick="buy('${i.id}', ${cost})" ${state.score < cost ? 'disabled' : ''}>💰 ${cost}</button>
            </div>`;
        }).join('');
    }

    function handleTap(e) {
        if(e.type === 'touchstart') e.preventDefault();
        const pts = e.touches ? Array.from(e.touches) : [{clientX: e.clientX, clientY: e.clientY}];
        pts.forEach(p => {
            if(state.energy >= 1) {
                let isCrit = Math.random() < state.critChance;
                let val = state.power * (isCrit ? 5 : 1);
                state.score += val; state.totalClicks++; state.energy--;
                showPop(p.clientX, p.clientY, `+${val}`, isCrit);
                tg.HapticFeedback.impactOccurred(isCrit?'heavy':'light');
            }
        });
        updateUI();
    }

    function showPop(x, y, txt, crit) {
        const d = document.createElement('div');
        d.className = 'tap-pop'; d.innerText = txt;
        if(crit) { d.style.color = "var(--crit)"; d.style.fontSize = "40px"; d.style.zIndex = "7000"; }
        d.style.left = x + 'px'; d.style.top = y + 'px';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 700);
    }

    function buy(id, cost) {
        if(state.score >= cost) {
            state.score -= cost; state.totalSpent += cost; state.lvls[id]++;
            if(id==='tap') state.power++; 
            if(id==='energy') state.max += 500;
            updateUI();
        }
    }

    function claimAchive(id, reward) {
        state.doneQuests.push(id);
        state.score += reward;
        updateUI();
        tg.showAlert("Нагороду отримано!");
    }

    // ПРОМОКОДИ
    function openPromo() { document.getElementById('promo-modal').style.display = 'flex'; }
    function closePromo() { document.getElementById('promo-modal').style.display = 'none'; }
    
    function checkPromo() {
        const input = document.getElementById('promo-input').value.trim();
        if(state.usedPromos.includes(input)) { tg.showAlert("Цей код вже активовано!"); return; }

        if(input === "B3RDO$") {
            state.score += 5757;
            state.usedPromos.push(input);
            tg.showAlert("Успішно! Отримано 5757 монет.");
        } else if(input === "saRAt@") {
            state.critChance = 0.25;
            state.usedPromos.push(input);
            tg.showAlert("Успішно! Шанс криту збільшено до 25%!");
        } else {
            tg.showAlert("Невірний код.");
        }
        updateUI();
        closePromo();
    }

    function nav(idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`p${idx}`).classList.add('active');
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
        document.getElementById('capsule').style.left = (idx * 20) + "%";
    }

    // Ініціалізація та цикли
    document.getElementById('coin').addEventListener('touchstart', handleTap);
    
    setInterval(() => {
        if(state.energy < state.max) state.energy = Math.min(state.max, state.energy + 2);
        if(state.lvls.bot > 0) state.score += (state.lvls.bot * 1);
        updateUI();
    }, 1000);

    // Офлайн логіка (спрощена)
    window.onload = () => {
        const saved = localStorage.getItem('raccoon_state');
        if(saved) {
            const old = JSON.parse(saved);
            const diff = Math.floor((Date.now() - old.lastUpdate)/1000);
            state = {...state, ...old};
            state.energy = Math.min(state.max, state.energy + (diff * 2));
            if(state.lvls.bot > 0) state.score += (diff * state.lvls.bot);
        }
        updateUI();
    };
    window.onbeforeunload = () => {
        state.lastUpdate = Date.now();
        localStorage.setItem('raccoon_state', JSON.stringify(state));
    };

    function openTop() { document.getElementById('top-modal').style.display = 'flex'; }
    function closeTop() { document.getElementById('top-modal').style.display = 'none'; }
    function openBonus() { if(state.bonusLimit > 0) document.getElementById('bonus-win').style.display = 'flex'; }

    updateUI();
    tg.expand();
</script>
</body>
</html>
