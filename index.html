<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raccoon Coin - Extreme</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --yellow: #fde047;
            --crit: #ff3b30;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
            --bg: #000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg); color: #fff; height: 100dvh; overflow: hidden;
            display: flex; justify-content: center;
        }

        #debug-log { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; 
            background: rgba(255,0,0,0.8); font-size: 10px; pointer-events: none; 
        }

        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* НАВІГАЦІЯ */
        nav {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 85px;
            background: rgba(10, 10, 10, 0.7); border-top: 1px solid var(--border);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-grid { display: flex; height: 100%; position: relative; width: 100%; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; z-index: 5; opacity: 0.3; transition: 0.3s; }
        .nav-item.active { opacity: 1; }
        .nav-item img { width: 28px; height: 28px; }

        .capsule {
            position: absolute; width: 25%; height: 55px; top: 15px;
            background: rgba(255, 255, 255, 0.1); border-radius: 20px;
            transition: transform 0.4s cubic-bezier(0.18, 0.9, 0.3, 1.1);
            z-index: 1; border: 1px solid rgba(255,255,255,0.05);
        }

        /* КОНТЕНТ */
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; scrollbar-width: none; }
        .page { display: none; flex-direction: column; padding: 20px; animation: pageIn 0.3s ease-out; }
        .page.active { display: flex; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #score { font-size: 58px; font-weight: 900; color: var(--yellow); text-align: center; margin: 20px 0; }
        .coin-box { flex: 1; display: flex; align-items: center; justify-content: center; }
        .coin-img { width: 75vw; max-width: 320px; transition: transform 0.05s; }
        .coin-img:active { transform: scale(0.92); }

        .card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 24px;
            padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }

        .btn-ui { background: var(--yellow); color: #000; border: none; padding: 12px 18px; border-radius: 14px; font-weight: 800; }
        .btn-ui:disabled { opacity: 0.2; }

        .energy-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #bar-fill { height: 100%; background: var(--yellow); width: 100%; transition: width 0.3s; }

        /* БОНУС */
        #bonus-win {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }

        .tap-pop {
            position: fixed; pointer-events: none; font-weight: 900; z-index: 6000;
            animation: tapAnim 0.8s ease-out forwards;
        }
        @keyframes tapAnim { 
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 
            20% { opacity: 1; transform: translate(-50%, -100%) scale(1.3); }
            100% { transform: translate(var(--tx), -200px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="debug-log"></div>

<div id="app">
    <div class="content">
        <div class="page active" id="p0">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b id="username" style="opacity:0.4; font-size:12px;">PLAYER</b>
                <div onclick="openBonus()" style="cursor:pointer; font-size:24px;">🎁 <small id="b-limit">3/3</small></div>
            </div>
            <div id="score">0</div>
            <div class="coin-box">
                <img id="coin" class="coin-img" src="https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png">
            </div>
            <div class="card" style="display:block">
                <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:900;">
                    <span>ENERGY</span>
                    <span id="energy-txt">1000/1000</span>
                </div>
                <div class="energy-bar"><div id="bar-fill"></div></div>
            </div>
        </div>

        <div class="page" id="p1"><h2>Shop</h2><div id="shop-list"></div></div>
        <div class="page" id="p2"><h2>Quests</h2><div id="quest-list"></div></div>
        <div class="page" id="p3"><h2>Stats</h2><div id="stat-list"></div></div>
    </div>

    <nav>
        <div class="nav-grid">
            <div id="capsule" class="capsule"></div>
            <div class="nav-item active" onclick="nav(0)"><img src="https://i.ibb.co/chM9Ftgt/retouch-2026031610215594.png"></div>
            <div class="nav-item" onclick="nav(1)"><img src="https://i.ibb.co/xtM6BCyd/shopping-cart-1f6d2.png"></div>
            <div class="nav-item" onclick="nav(2)"><img src="https://i.ibb.co/6ctcw0gn/trophy-1f3c6.png"></div>
            <div class="nav-item" onclick="nav(3)"><img src="https://i.ibb.co/wrZK79M8/bar-chart-1f4ca.png"></div>
        </div>
    </nav>
</div>

<div id="bonus-win">
    <div id="b-ready" style="text-align:center;">
        <h1 style="font-size:40px;">READY?</h1>
        <p style="opacity:0.5; margin:20px 0;">7.5 SECONDS / 10x MULTIPLIER</p>
        <button class="btn-ui" onclick="startBonusNow()" style="width:200px; height:60px;">START</button>
    </div>
    <div id="b-active" style="display:none; text-align:center;">
        <div id="b-timer" style="font-size:100px; font-weight:900; color:var(--yellow);">7.5</div>
        <div id="b-clicks" style="font-size:24px;">CLICKS: 0</div>
    </div>
</div>

<script>
    // --- ПОМИЛКИ ---
    function log(msg) { document.getElementById('debug-log').innerText = msg; }

    // --- SUPABASE ---
    const SB_URL = 'https://ohyagfbgaekifqrxvvks.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oeWFnZmJnYWVraWZxcnh2dmtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc2MzIsImV4cCI6MjA4OTUwMzYzMn0.VJhJcN3RaeJdZVsLKGU3NjLvCCdNTR5TA_Sp6jj1WKM';
    
    let db;
    try {
        const { createClient } = supabase;
        db = createClient(SB_URL, SB_KEY);
    } catch(e) { log("Supabase Init Error: " + e.message); }

    // --- TG ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "dev_user";
    document.getElementById('username').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name.toUpperCase() : "TEST_MODE";

    // --- STATE ---
    let state = {
        score: 0, energy: 1000, max: 1000, power: 1,
        totalEarned: 0, totalClicks: 0, bonusLimit: 3, lastDate: "",
        lvls: { tap: 1, energy: 1, bot: 0 }, doneQuests: []
    };

    // --- CLOUD ---
    async function load() {
        try {
            const { data, error } = await db.from('players').select('state').eq('id', userId).maybeSingle();
            if(data) state = Object.assign(state, data.state);
            updateUI();
        } catch(e) { log("Load Error: " + e.message); }
    }

    async function save() {
        try { await db.from('players').upsert({ id: userId, state: state }); } catch(e) {}
    }

    // --- ENGINE ---
    function nav(idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`p${idx}`).classList.add('active');
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
        document.getElementById('capsule').style.transform = `translateX(${idx * 100}%)`;
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-txt').innerText = `${Math.floor(state.energy)}/${state.max}`;
        document.getElementById('bar-fill').style.width = (state.energy/state.max)*100 + "%";
        document.getElementById('b-limit').innerText = `${state.bonusLimit}/3`;

        // Stats (спрощено)
        document.getElementById('stat-list').innerHTML = `<div class="card"><span>Lifetime Earned</span><b>${Math.floor(state.totalEarned).toLocaleString()}</b></div><div class="card"><span>Power</span><b>${state.power}</b></div>`;
    }

    function spawn(x, y, txt, crit) {
        const d = document.createElement('div');
        d.className = 'tap-pop'; d.innerText = txt;
        d.style.left = x + 'px'; d.style.top = y + 'px';
        d.style.setProperty('--tx', (Math.random()*100-50)+'px');
        if(crit) d.style.color = 'var(--crit)';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 800);
    }

    function tap(e) {
        if(isB) return;
        e.preventDefault();
        const pts = e.touches ? e.touches : [e];
        for(let p of pts) {
            if(state.energy >= 1) {
                state.score += state.power; state.totalEarned += state.power;
                state.energy -= 1; state.totalClicks++;
                spawn(p.clientX, p.clientY, `+${state.power}`, false);
            }
        }
        updateUI();
    }

    // --- BONUS ---
    let isB = false, bc = 0;
    function openBonus() {
        if(state.bonusLimit <= 0) return tg.showAlert("Limit!");
        document.getElementById('bonus-win').style.display = 'flex';
        document.getElementById('b-ready').style.display = 'block';
        document.getElementById('b-active').style.display = 'none';
    }

    function startBonusNow() {
        document.getElementById('b-ready').style.display = 'none';
        document.getElementById('b-active').style.display = 'block';
        isB = true; bc = 0;
        let t = 7.5;
        let itv = setInterval(() => {
            t -= 0.1;
            document.getElementById('b-timer').innerText = Math.max(0, t).toFixed(1);
            if(t <= 0) { clearInterval(itv); finish(); }
        }, 100);
    }

    function finish() {
        let win = bc * state.power * 10;
        state.score += win; state.totalEarned += win;
        state.bonusLimit--; isB = false;
        document.getElementById('bonus-win').style.display = 'none';
        updateUI(); save();
    }

    document.getElementById('bonus-win').ontouchstart = (e) => {
        if(isB) {
            bc += e.touches.length;
            document.getElementById('b-clicks').innerText = `CLICKS: ${bc}`;
            for(let t of e.touches) spawn(t.clientX, t.clientY, "x10", true);
        }
    };

    document.getElementById('coin').addEventListener('touchstart', tap);

    // Loop
    setInterval(() => {
        if(state.energy < state.max) state.energy = Math.min(state.max, state.energy + 2);
        updateUI();
    }, 1000);
    setInterval(save, 15000);

    load();
</script>
</body>
</html>
