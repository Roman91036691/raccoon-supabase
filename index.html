<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raccoon Coin Deluxe</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --yellow: #fde047; 
            --gold: #fbbf24;
            --crit: #ff3b30; 
            --gray: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1);
            --neon: 0 0 20px rgba(253, 224, 71, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
        }

        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

        .header-tools { position: absolute; top: 25px; right: 20px; display: flex; gap: 18px; align-items: center; z-index: 100; }
        .header-tools img, .header-tools div { filter: drop-shadow(var(--neon)); transition: transform 0.2s; }

        nav { 
            position: absolute; bottom: 15px; left: 10px; right: 10px; 
            height: 75px; background: rgba(20, 20, 20, 0.85); 
            border: 1px solid var(--border); border-radius: 25px;
            backdrop-filter: blur(15px); z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-grid { display: flex; height: 100%; position: relative; padding: 0 10px; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.4; transition: 0.3s; z-index: 2; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); }
        .nav-item img { width: 28px; height: 28px; }
        
        .capsule { 
            position: absolute; width: 18%; height: 50px; top: 12px; 
            background: linear-gradient(135deg, var(--yellow), var(--gold)); 
            border-radius: 18px; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 5px 15px rgba(253, 224, 71, 0.4);
        }

        .content { flex: 1; overflow-y: auto; padding-bottom: 120px; scrollbar-width: none; }
        .page { display: none; flex-direction: column; padding: 25px; animation: slideIn 0.4s ease-out; }
        .page.active { display: flex; }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(20px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        #score { 
            font-size: 64px; font-weight: 900; color: var(--yellow); 
            text-align: center; margin: 40px 0 5px; 
            text-shadow: 0 0 30px rgba(253,224,71,0.4);
            animation: pulseScore 2s infinite ease-in-out;
        }
        @keyframes pulseScore { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .coin-box { flex: 1; display: flex; align-items: center; justify-content: center; }
        .coin-img { 
            width: 78vw; max-width: 300px; 
            filter: drop-shadow(0 0 50px rgba(253, 224, 71, 0.15));
            transition: transform 0.1s;
            animation: coinFloat 4s infinite ease-in-out;
            cursor: pointer;
        }
        @keyframes coinFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .coin-img:active { transform: scale(0.88) !important; }

        .card { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 28px; padding: 20px; margin-bottom: 15px; 
            backdrop-filter: blur(10px);
        }
        
        .btn-ui { 
            background: linear-gradient(135deg, var(--yellow), var(--gold)); 
            color: #000; border: none; padding: 14px 22px; 
            border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-ui:disabled { background: #333 !important; color: #777 !important; }

        .bar-container { background: rgba(255,255,255,0.05); height: 12px; border-radius: 20px; overflow: hidden; }
        #bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--yellow)); box-shadow: 0 0 15px var(--yellow); transition: width 0.3s; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(20px); }

        .tap-pop { 
            position: fixed; pointer-events: none; font-weight: 900; font-size: 32px;
            z-index: 6000; animation: tapAnim 0.8s ease-out forwards; 
        }
        @keyframes tapAnim { 
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 
            20% { opacity: 1; transform: translate(-50%, -100%) scale(1.2); } 
            100% { transform: translate(var(--tx), -250px) scale(1); opacity: 0; } 
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header-tools">
        <img src="https://i.ibb.co/dwcQhshq/top-arrow-1f51d.png" style="width:38px; cursor:pointer;" onclick="openTop()">
        <div onclick="openBonus()" style="position:relative; cursor:pointer; font-size:36px;">
            🎁 <small id="b-limit" style="position:absolute; top:-5px; right:-5px; background:var(--crit); color:white; font-size:11px; padding:3px 7px; border-radius:12px; font-weight:900;">3</small>
        </div>
    </div>

    <div class="content">
        <div class="page active" id="p0">
            <div style="margin-top:20px; opacity:0.6; font-size:12px; text-align:center;" id="username">ЗАВАНТАЖЕННЯ...</div>
            <div id="score">0</div>
            <div class="coin-box">
                <img id="coin" class="coin-img" src="https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png">
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:900; margin-bottom:10px; color: var(--yellow);">
                    <span>⚡ ЕНЕРГІЯ</span> <span id="energy-txt">1000/1000</span>
                </div>
                <div class="bar-container">
                    <div id="bar-fill" style="width:100%;"></div>
                </div>
            </div>
        </div>

        <div class="page" id="p1">
            <h1 style="margin-bottom:25px;">Магазин</h1>
            <div id="shop-list"></div>
        </div>

        <div class="page" id="p2">
            <h1 style="margin-bottom:25px;">Друзі</h1>
            <div class="card" style="text-align:center;">
                <h3 style="color:var(--yellow); margin-bottom:10px;">Запроси друга</h3>
                <p style="opacity:0.7; margin-bottom:20px;">Отримай +10,000 монет!</p>
                <div id="ref-link-display" style="background:rgba(0,0,0,0.3); padding:15px; border-radius:15px; font-size:11px; margin-bottom:20px; border:1px dashed var(--border); word-break:break-all;">---</div>
                <button class="btn-ui" onclick="inviteFriend()" style="width:100%; margin-bottom:10px;">🚀 НАДІСЛАТИ</button>
                <button class="btn-ui" onclick="copyRefLink()" style="width:100%; background:var(--glass); color:#fff;">📋 КОПІЮВАТИ</button>
            </div>
        </div>

        <div class="page" id="p3"><h1 style="margin-bottom:25px;">Квести</h1><div id="quest-list"></div></div>
        <div class="page" id="p4"><h1 style="margin-bottom:25px;">Статистика</h1><div id="stat-list"></div></div>
    </div>

    <nav>
        <div class="nav-grid">
            <div id="capsule" class="capsule"></div>
            <div class="nav-item active" onclick="nav(0)"><img src="https://i.ibb.co/chM9Ftgt/retouch-2026031610215594.png"></div>
            <div class="nav-item" onclick="nav(1)"><img src="https://i.ibb.co/xtM6BCyd/shopping-cart-1f6d2.png"></div>
            <div class="nav-item" onclick="nav(2)"><img src="https://i.ibb.co/mCWNRzgf/busts-in-silhouette-1f465.png"></div>
            <div class="nav-item" onclick="nav(3)"><img src="https://i.ibb.co/6ctcw0gn/trophy-1f3c6.png"></div>
            <div class="nav-item" onclick="nav(4)"><img src="https://i.ibb.co/wrZK79M8/bar-chart-1f4ca.png"></div>
        </div>
    </nav>
</div>

<div id="top-modal" class="modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h2 style="color:var(--yellow)">ТОП ГРАВЦІВ</h2>
        <b onclick="closeTop()" style="font-size:24px; cursor:pointer;">✕</b>
    </div>
    <div id="top-content"></div>
</div>

<div id="bonus-win" class="modal">
    <div id="b-ready" style="text-align:center; margin-top: 50px;">
        <h1 style="font-size:45px; color:var(--yellow);">БОНУС!</h1>
        <p style="opacity:0.6; margin:20px 0;">x10 КЛІК НА 7.5 СЕКУНД</p>
        <button class="btn-ui" onclick="startBonusNow()" style="width:200px; height:60px;">ПОЧАТИ</button>
    </div>
    <div id="b-active" style="display:none; text-align:center; width:100%; height:100%;">
        <div id="b-timer" style="margin-top:20vh; font-size:100px; font-weight:900; color:var(--yellow);">7.5</div>
        <div id="b-clicks" style="font-size:30px; margin-top:20px;">КЛІКІВ: 0</div>
        <div id="bonus-click-zone" style="position:absolute; inset:0; z-index:10;"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://ohyagfbgaekifqrxvvks.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oeWFnZmJnYWVraWZxcnh2dmtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc2MzIsImV4cCI6MjA4OTUwMzYzMn0.VJhJcN3RaeJdZVsLKGU3NjLvCCdNTR5TA_Sp6jj1WKM';
    
    let db = null;
    try { if (typeof supabase !== 'undefined') db = supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

    let tg = window.Telegram.WebApp;
    let userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
    let userName = (tg.initDataUnsafe?.user?.first_name || "ГРАВЕЦЬ").toUpperCase();

    let state = {
        score: 0, energy: 1000, max: 1000, power: 1, totalClicks: 0, totalCrits: 0,
        totalEarned: 0, bonusGames: 0, bonusEarned: 0, bonusLimit: 3, lastBonusDate: "",
        friends: 0, botLvl: 0, lvls: { tap: 1, energy: 1, bot: 0 }, doneQuests: []
    };

    let isB = false, bc = 0, bonusInterval;

    async function loadData() {
        document.getElementById('username').innerText = userName;
        if (!db) { updateUI(); return; }
        try {
            const { data } = await db.from('players').select('state').eq('id', userId).maybeSingle();
            if (data?.state) {
                state = { ...state, ...data.state, lvls: { ...state.lvls, ...data.state.lvls } };
            }
        } catch (e) {}
        updateUI();
    }

    async function saveData() {
        if (!db) return;
        try { await db.from('players').upsert({ id: userId, username: userName, state: state, score_top: Math.floor(state.score) }); } catch(e) {}
    }

    function updateUI() {
        const today = new Date().toLocaleDateString();
        if(state.lastBonusDate !== today) { state.bonusLimit = 3; state.lastBonusDate = today; }

        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-txt').innerText = `${Math.floor(state.energy)}/${state.max}`;
        document.getElementById('bar-fill').style.width = (state.energy/state.max)*100 + "%";
        document.getElementById('b-limit').innerText = state.bonusLimit;
        document.getElementById('ref-link-display').innerText = `https://t.me/raccoon_coin_tap_bot/RACCOON_TAP_APP?startapp=${userId}`;

        const items = [{ id: 'tap', n: 'Мульти-клік', b: 100 }, { id: 'energy', n: 'Енергетик', b: 200 }, { id: 'bot', n: 'Авто-бот', b: 800 }];
        document.getElementById('shop-list').innerHTML = items.map(i => {
            const cost = Math.floor(i.b * Math.pow(1.5, state.lvls[i.id]));
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${i.n}</b><br><small>Lvl ${state.lvls[i.id]}</small></div>
                <button class="btn-ui" onclick="buy('${i.id}', ${cost})" ${state.score < cost ? 'disabled' : ''}>💰 ${cost}</button>
            </div>`;
        }).join('');

        const st = [["На балансі", state.score], ["Всього здобуто", state.totalEarned], ["Сила тапу", state.power]];
        document.getElementById('stat-list').innerHTML = st.map(s => `<div class="card" style="display:flex; justify-content:space-between;"><span>${s[0]}</span><b>${Math.floor(s[1])}</b></div>`).join('');
    }

    function spawnPop(x, y, txt, color) {
        const d = document.createElement('div');
        d.className = 'tap-pop'; d.innerText = txt;
        d.style.left = x + 'px'; d.style.top = y + 'px'; d.style.color = color || '#fff';
        d.style.setProperty('--tx', (Math.random()*100-50)+'px');
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 700);
    }

    function handleTap(e) {
        if(isB) return;
        if(e.type === 'touchstart') e.preventDefault();
        const pts = e.touches ? Array.from(e.touches) : [{clientX: e.clientX, clientY: e.clientY}];
        for(let p of pts) {
            if(state.energy >= 1) {
                let crit = Math.random() < 0.08;
                let val = state.power * (crit ? 5 : 1);
                state.score += val; state.totalEarned += val; state.energy--;
                spawnPop(p.clientX, p.clientY, `+${val}`, crit ? 'var(--crit)' : '#fff');
            }
        }
        updateUI();
    }

    function buy(id, cost) {
        if(state.score >= cost) {
            state.score -= cost; state.lvls[id]++;
            if(id==='tap') state.power++; 
            if(id==='energy') state.max += 500; 
            updateUI(); saveData();
        }
    }

    function nav(idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`p${idx}`).classList.add('active');
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
        document.getElementById('capsule').style.transform = `translateX(${idx * 100}%)`;
    }

    function openTop() { document.getElementById('top-modal').style.display = 'flex'; }
    function closeTop() { document.getElementById('top-modal').style.display = 'none'; }

    function openBonus() {
        if(state.bonusLimit > 0) {
            document.getElementById('bonus-win').style.display = 'flex';
            document.getElementById('b-ready').style.display = 'block';
            document.getElementById('b-active').style.display = 'none';
        }
    }

    function startBonusNow() {
        bc = 0; isB = true;
        document.getElementById('b-ready').style.display = 'none';
        document.getElementById('b-active').style.display = 'block';
        let start = performance.now();
        bonusInterval = setInterval(() => {
            let left = Math.max(0, 7.5 - (performance.now() - start) / 1000);
            document.getElementById('b-timer').innerText = left.toFixed(1);
            if(left <= 0) { clearInterval(bonusInterval); finishBonus(); }
        }, 50);
    }

    function finishBonus() {
        isB = false;
        let win = bc * state.power * 10;
        state.score += win; state.bonusLimit--;
        document.getElementById('bonus-win').style.display = 'none';
        updateUI(); saveData();
    }

    function setupClick(id, h) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', h, {passive: false});
        el.addEventListener('mousedown', h);
    }

    setupClick('coin', handleTap);
    setupClick('bonus-click-zone', (e) => {
        bc++; 
        document.getElementById('b-clicks').innerText = `КЛІКІВ: ${bc}`;
        let x = e.touches ? e.touches[0].clientX : e.clientX;
        let y = e.touches ? e.touches[0].clientY : e.clientY;
        spawnPop(x, y, "x10", 'var(--yellow)');
    });

    setInterval(() => {
        if(state.energy < state.max) state.energy = Math.min(state.max, state.energy + 2);
        updateUI();
    }, 1000);

    loadData();
    tg.expand();
</script>
</body>
        </html>
