<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raccoon Coin - Final Fixed</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --yellow: #fde047; --crit: #ff3b30; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        
        /* Debug Panel */
        #debug-log { position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; background: rgba(255,0,0,0.9); font-size: 10px; padding: 5px; display: none; word-break: break-all; }

        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* Navigation */
        nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; background: rgba(15,15,15,0.8); border-top: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-grid { display: flex; height: 100%; position: relative; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; opacity: 0.4; transition: 0.3s; font-size: 10px; }
        .nav-item.active { opacity: 1; color: var(--yellow); }
        .nav-item span { font-size: 24px; margin-bottom: 2px; }
        .capsule { position: absolute; width: 20%; height: 50px; top: 12px; background: rgba(255,255,255,0.1); border-radius: 15px; transition: transform 0.3s ease; z-index: 1; }

        /* Content Areas */
        .content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .page { display: none; flex-direction: column; padding: 20px; animation: fadeIn 0.2s ease; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Game Elements */
        #score { font-size: 50px; font-weight: 900; color: var(--yellow); text-align: center; margin: 15px 0; }
        .coin-box { flex: 1; display: flex; align-items: center; justify-content: center; }
        .coin-img { width: 280px; transition: transform 0.05s; cursor: pointer; }
        .coin-img:active { transform: scale(0.95); }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-ui { background: var(--yellow); color: #000; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-ui:disabled { opacity: 0.3; }

        .energy-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        #bar-fill { height: 100%; background: var(--yellow); width: 100%; transition: width 0.2s; }

        /* Popups for Taps */
        .tap-pop { position: fixed; pointer-events: none; font-weight: 900; z-index: 2000; animation: tapAnim 0.7s ease-out forwards; color: #fff; font-size: 24px; }
        @keyframes tapAnim { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }

        /* Bonus Overlay */
        #bonus-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="debug-log">Помилок немає</div>

<div id="app">
    <div class="content">
        <div class="page active" id="p0">
            <div style="display:flex; justify-content:space-between;">
                <span id="user-display" style="font-size:12px; opacity:0.5;">PLAYER</span>
                <div onclick="startBonus()" style="cursor:pointer;">🎁 <span id="b-count">3/3</span></div>
            </div>
            <div id="score">0</div>
            <div class="coin-box">
                <img id="coin" class="coin-img" src="https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png">
            </div>
            <div class="card" style="display:block;">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <b>ENERGY</b><span id="energy-txt">1000/1000</span>
                </div>
                <div class="energy-bar"><div id="bar-fill"></div></div>
            </div>
        </div>

        <div class="page" id="p1">
            <h2>Shop</h2><div id="shop-list" style="margin-top:15px;"></div>
        </div>

        <div class="page" id="p2">
            <h2>Quests</h2><div id="quest-list" style="margin-top:15px;"></div>
        </div>

        <div class="page" id="p3">
            <h2>Friends</h2>
            <div class="card" style="display:block; text-align:center; margin-top:15px;">
                <p>Get 10,000 for each friend!</p>
                <div id="ref-link" style="font-size:10px; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; margin:10px 0; word-break:break-all; color:var(--yellow);">Generating...</div>
                <button class="btn-ui" style="width:100%;" onclick="shareLink()">Invite Friend</button>
            </div>
            <div class="card"><span>Friends invited:</span> <b id="f-stat">0</b></div>
        </div>

        <div class="page" id="p4">
            <h2>Stats</h2><div id="stat-list" style="margin-top:15px;"></div>
        </div>
    </div>

    <nav>
        <div class="nav-grid">
            <div id="capsule" class="capsule"></div>
            <div class="nav-item active" onclick="nav(0)"><span>🦝</span>Game</div>
            <div class="nav-item" onclick="nav(1)"><span>🛒</span>Shop</div>
            <div class="nav-item" onclick="nav(2)"><span>🏆</span>Quests</div>
            <div class="nav-item" onclick="nav(3)"><span>👥</span>Friends</div>
            <div class="nav-item" onclick="nav(4)"><span>📊</span>Stats</div>
        </div>
    </nav>
</div>

<div id="bonus-overlay">
    <h1 id="b-status" style="font-size:40px; color:var(--yellow);">READY?</h1>
    <p id="b-desc" style="margin:20px 0;">10x POINTS FOR 7.5 SECONDS</p>
    <button id="b-start-btn" class="btn-ui" onclick="runBonusTimer()" style="padding:20px 40px;">START</button>
    <div id="b-timer" style="font-size:80px; display:none; font-weight:900;">7.5</div>
</div>

<script>
    // --- ПОМИЛКИ ---
    function log(m) { 
        const d = document.getElementById('debug-log');
        d.style.display = 'block'; d.innerText = m;
    }

    // --- НАЛАШТУВАННЯ ---
    const SB_URL = 'https://ohyagfbgaekifqrxvvks.supabase.co
        '; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oeWFnZmJnYWVraWZxcnh2dmtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc2MzIsImV4cCI6MjA4OTUwMzYzMn0.VJhJcN3RaeJdZVsLKGU3NjLvCCdNTR5TA_Sp6jj1WKM';
    const BOT_NAME = 'raccoon_coin_tap_bot';
    const APP_NAME = 'RACCOON_TAP_APP';

    let db;
    try {
        db = supabase.createClient(SB_URL, SB_KEY);
    } catch(e) { log("DB Init Fail: " + e.message); }

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "local_dev";
    const userName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Dev";

    // --- СТАН ---
    let state = {
        score: 0, energy: 1000, max: 1000, power: 1,
        totalEarned: 0, totalClicks: 0, friends: 0,
        lvls: { tap: 1, energy: 1, bot: 0 },
        bonusLimit: 3, lastBonusDate: "", doneQuests: []
    };

    // --- КЛІКИ ---
    function showPop(x, y, v, c) {
        const el = document.createElement('div');
        el.className = 'tap-pop'; el.innerText = v;
        el.style.left = x + 'px'; el.style.top = y + 'px';
        if(c) el.style.color = 'var(--crit)';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 700);
    }

    function doTap(e) {
        if(isBonusActive) return;
        const pts = e.touches ? Array.from(e.touches) : [e];
        pts.forEach(p => {
            if(state.energy >= 1) {
                let crit = Math.random() < 0.05;
                let val = state.power * (crit ? 5 : 1);
                state.score += val; state.totalEarned += val;
                state.energy -= 1; state.totalClicks++;
                showPop(p.clientX, p.clientY, `+${val}`, crit);
            }
        });
        updateUI();
    }

    // --- БОНУС ---
    let isBonusActive = false;
    function startBonus() {
        if(state.bonusLimit <= 0) return tg.showAlert("No more bonuses today!");
        document.getElementById('bonus-overlay').style.display = 'flex';
        document.getElementById('b-status').style.display = 'block';
        document.getElementById('b-start-btn').style.display = 'block';
        document.getElementById('b-timer').style.display = 'none';
    }

    function runBonusTimer() {
        isBonusActive = true;
        document.getElementById('b-status').style.display = 'none';
        document.getElementById('b-start-btn').style.display = 'none';
        const tEl = document.getElementById('b-timer');
        tEl.style.display = 'block';
        let timeLeft = 7.5;
        let itv = setInterval(() => {
            timeLeft -= 0.1;
            tEl.innerText = Math.max(0, timeLeft).toFixed(1);
            if(timeLeft <= 0) {
                clearInterval(itv);
                isBonusActive = false;
                state.bonusLimit--;
                document.getElementById('bonus-overlay').style.display = 'none';
                save();
            }
        }, 100);
    }

    // Бонусні тапи (через накладення)
    document.getElementById('bonus-overlay').addEventListener('touchstart', (e) => {
        if(!isBonusActive) return;
        Array.from(e.touches).forEach(p => {
            let val = state.power * 10;
            state.score += val; state.totalEarned += val;
            showPop(p.clientX, p.clientY, `+${val}`, true);
        });
        updateUI();
    });

    // --- МАГАЗИН ТА КВЕСТИ ---
    const items = [{id:'tap', n:'Multi-Tap', p:100}, {id:'energy', n:'Energy Boost', p:250}, {id:'bot', n:'Auto-Bot', p:1000}];
    function buy(id, cost) {
        if(state.score >= cost) {
            state.score -= cost; state.lvls[id]++;
            if(id==='tap') state.power++;
            if(id==='energy') state.max+=500;
            updateUI(); save();
        }
    }

    // --- UI ТА НАВІГАЦІЯ ---
    function nav(i) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`p${i}`).classList.add('active');
        document.querySelectorAll('.nav-item')[i].classList.add('active');
        document.getElementById('capsule').style.transform = `translateX(${i*100}%)`;
    }

    function updateUI() {
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-txt').innerText = `${Math.floor(state.energy)}/${state.max}`;
        document.getElementById('bar-fill').style.width = (state.energy/state.max)*100 + "%";
        document.getElementById('b-count').innerText = `${state.bonusLimit}/3`;
        document.getElementById('user-display').innerText = userName.toUpperCase();
        document.getElementById('f-stat').innerText = state.friends;
        document.getElementById('ref-link').innerText = `https://t.me/${BOT_NAME}/${APP_NAME}?startapp=${userId}`;

        document.getElementById('shop-list').innerHTML = items.map(i => {
            let cost = Math.floor(i.p * Math.pow(2.2, state.lvls[i.id]));
            return `<div class="card"><div><b>${i.n}</b><br><small>Lvl ${state.lvls[i.id]}</small></div><button class="btn-ui" onclick="buy('${i.id}',${cost})" ${state.score<cost?'disabled':''}>${cost}</button></div>`;
        }).join('');

        const stats = [["Total Earned", state.totalEarned], ["Total Taps", state.totalClicks], ["Click Power", state.power], ["Auto Bot", state.lvls.bot]];
        document.getElementById('stat-list').innerHTML = stats.map(s => `<div class="card"><span>${s[0]}</span><b>${s[1].toLocaleString()}</b></div>`).join('');
    }

    function shareLink() {
        const link = `https://t.me/${BOT_NAME}/${APP_NAME}?startapp=${userId}`;
        const url = `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent("Join me in Raccoon Coin!")}`;
        tg.openTelegramLink(url);
    }

    // --- DATA ---
    async function load() {
        try {
            const { data } = await db.from('players').select('state').eq('id', userId).maybeSingle();
            if(data) {
                state = Object.assign(state, data.state);
            } else {
                // Реферал?
                const ref = tg.initDataUnsafe.start_param;
                if(ref && ref !== userId) {
                    state.score += 5000;
                    await db.rpc('increment_friends', { user_id: ref }); // Якщо є функція, або просто оновити потім
                }
            }
            updateUI();
        } catch(e) { log("Load Error: " + e.message); }
    }

    async function save() {
        try { await db.from('players').upsert({ id: userId, state: state }); } catch(e) {}
    }

    // --- EVENTS ---
    const c = document.getElementById('coin');
    c.addEventListener('touchstart', (e) => { e.preventDefault(); doTap(e); });
    c.addEventListener('mousedown', doTap);

    setInterval(() => {
        if(state.energy < state.max) state.energy = Math.min(state.max, state.energy + 2);
        if(state.lvls.bot > 0) { state.score += state.lvls.bot; state.totalEarned += state.lvls.bot; }
        updateUI();
    }, 1000);
    setInterval(save, 15000);

    load();
</script>
</body>
</html>
