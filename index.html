<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raccoon Coin Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --yellow: #fde047; --gold: #fbbf24; --crit: #ff3b30; 
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15);
            --neon: 0 0 15px rgba(253, 224, 71, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: radial-gradient(circle at top, #1e1e1e 0%, #000 100%); color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* HEADER */
        .header-tools { position: absolute; top: 25px; right: 20px; display: flex; gap: 15px; align-items: center; z-index: 100; }
        .header-btn { width: 36px; height: 36px; cursor: pointer; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); transition: 0.2s; }
        .header-btn:active { transform: scale(0.9); }
        #username { margin-top: 25px; padding-left: 25px; opacity: 0.8; font-size: 14px; font-weight: 700; text-align: left; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}

        /* NAV */
        nav { position: absolute; bottom: 15px; left: 12px; right: 12px; height: 70px; background: rgba(10, 10, 10, 0.85); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(20px); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        .nav-grid { display: flex; height: 100%; position: relative; align-items: center; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.4; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2; position: relative; height: 100%; cursor: pointer;}
        .nav-item.active { opacity: 1; transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
        .nav-item img { width: 26px; height: 26px; }
        .capsule { position: absolute; width: 20%; height: 50px; background: rgba(253, 224, 71, 0.1); border: 1.5px solid var(--yellow); border-radius: 18px; transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: var(--neon); pointer-events: none; left: 0;}

        /* PAGES */
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; scrollbar-width: none; }
        .page { display: none; flex-direction: column; padding: 25px; animation: pageFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .page.active { display: flex; }
        @keyframes pageFade { from { opacity: 0; transform: scale(0.97) translateY(15px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        #score { font-size: 62px; font-weight: 900; color: var(--yellow); text-align: center; margin: 30px 0 5px; text-shadow: 0 0 30px rgba(253,224,71,0.5); letter-spacing: -1px; }

        .coin-box { flex: 1; display: flex; align-items: center; justify-content: center; }
        .coin-img { width: 75vw; max-width: 280px; transition: transform 0.05s ease-out; filter: drop-shadow(0 0 40px rgba(253,224,71,0.15)); cursor: pointer; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .coin-img:active { transform: scale(0.9) translateY(0) !important; filter: drop-shadow(0 0 60px rgba(253,224,71,0.4)); animation: none; }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        
        .btn-ui { background: linear-gradient(135deg, var(--yellow), var(--gold)); color: #000; border: none; padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .btn-ui:active { transform: scale(0.94); }
        .btn-ui:disabled { background: #333 !important; color: #666 !important; transform: none; box-shadow: none; }
        .input-ui { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; text-align: center; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; backdrop-filter: blur(15px);}
        .top-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: var(--glass); border-radius: 18px; margin-bottom: 8px; border: 1px solid var(--border); }
        .friend-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); }

        .bar-container { background: rgba(0,0,0,0.4); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid var(--border); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        #bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--yellow)); box-shadow: 0 0 10px var(--yellow); transition: width 0.2s ease-out; }

        .tap-pop { position: fixed; pointer-events: none; font-weight: 900; font-size: 34px; z-index: 6000; text-shadow: 0 4px 10px rgba(0,0,0,0.5); animation: tapFloat 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes tapFloat { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 15% { opacity: 1; transform: translate(-50%, -80%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -150px) scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <div class="header-tools">
        <img src="https://i.ibb.co/Vp2DCFMK/ticket-1f3ab.png" class="header-btn" onclick="openPromo()">
        <img src="https://i.ibb.co/dwcQhshq/top-arrow-1f51d.png" class="header-btn" onclick="openTop()">
        <div onclick="openBonus()" style="position:relative; cursor:pointer; font-size:32px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));">
            🎁 <small id="b-limit" style="position:absolute; top:-5px; right:-5px; background:var(--crit); color:white; font-size:11px; padding:2px 6px; border-radius:10px; font-weight: bold; border: 2px solid #000;">3</small>
        </div>
    </div>

    <div class="content">
        <div class="page active" id="p0">
            <div id="username">ЗАВАНТАЖЕННЯ...</div>
            <div id="score">0</div>
            <div class="coin-box"><img id="coin" class="coin-img" src="https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png"></div>
            <div class="card" style="margin-top: auto;">
                <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:900; color: var(--yellow);">
                    <span>⚡ ЕНЕРГІЯ</span> <span id="energy-txt">1000/1000</span>
                </div>
                <div class="bar-container"><div id="bar-fill" style="width:100%;"></div></div>
            </div>
        </div>

        <div class="page" id="p1">
            <h1 style="margin-bottom:25px; font-size:30px; text-shadow: var(--neon);">Бусти</h1>
            <div id="shop-list"></div>
        </div>

        <div class="page" id="p2">
            <h1 style="margin-bottom:20px; font-size:30px;">Команда</h1>
            <div class="card" style="text-align:center;">
                <h3 style="color:var(--yellow); margin-bottom:10px;">Запроси друга</h3>
                <p style="opacity:0.8; margin-bottom:15px; font-size: 14px;">Отримай <b style="color:var(--yellow)">+10,000</b> монет за кожного!</p>
                <button class="btn-ui" onclick="inviteFriend()" style="width:100%; margin-bottom:10px;">🚀 НАДІСЛАТИ ЗАПРОШЕННЯ</button>
            </div>
            <h3 style="margin: 15px 0; font-size: 20px;">Твої друзі (<span id="friends-count" style="color:var(--yellow)">0</span>)</h3>
            <div id="friends-list"></div>
        </div>

        <div class="page" id="p3">
            <h1 style="margin-bottom:10px; font-size:30px;">Досягнення</h1>
            <p style="opacity:0.6; margin-bottom:25px; font-size:14px;">Грай та забирай нагороди</p>
            <div id="quest-list"></div>
        </div>

        <div class="page" id="p4">
            <h1 style="margin-bottom:25px; font-size:30px;">Статистика</h1>
            <div id="stat-list"></div>
        </div>
    </div>

    <nav>
        <div class="nav-grid">
            <div id="capsule" class="capsule"></div>
            <div class="nav-item active" onclick="nav(0)"><img src="https://i.ibb.co/chM9Ftgt/retouch-2026031610215594.png"></div>
            <div class="nav-item" onclick="nav(1)"><img src="https://i.ibb.co/xtM6BCyd/shopping-cart-1f6d2.png"></div>
            <div class="nav-item" onclick="nav(2)"><img src="https://i.ibb.co/mCWNRzgf/busts-in-silhouette-1f465.png"></div>
            <div class="nav-item" onclick="nav(3)"><img src="https://i.ibb.co/6ctcw0gn/trophy-1f3c6.png"></div>
            <div class="nav-item" onclick="nav(4)"><img src="https://i.ibb.co/wrZK79M8/bar-chart-1f4ca.png"></div>
        </div>
    </nav>
</div>

<div id="promo-modal" class="modal" style="justify-content:center; align-items:center;">
    <div class="card" style="width:100%; text-align:center;">
        <h2 style="margin-bottom:20px; color:var(--yellow);">ПРОМОКОД</h2>
        <input type="text" id="promo-input" class="input-ui" placeholder="Введіть код...">
        <button class="btn-ui" onclick="checkPromo()" style="width:100%;">АКТИВУВАТИ</button>
        <p onclick="document.getElementById('promo-modal').style.display='none'" style="margin-top:20px; opacity:0.5; cursor:pointer;">Закрити</p>
    </div>
</div>

<div id="top-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--yellow); text-shadow: var(--neon);">🏆 ТОП 10</h2>
        <div onclick="document.getElementById('top-modal').style.display='none'" style="width:35px; height:35px; background:var(--glass); border-radius:50%; display:flex; justify-content:center; align-items:center; cursor:pointer;">✕</div>
    </div>
    <div id="top-content" style="overflow-y:auto; flex:1; padding-bottom: 20px;"></div>
</div>

<div id="bonus-win" class="modal" style="justify-content:center; align-items:center; text-align:center;">
    <div id="b-ready">
        <div style="font-size: 70px; margin-bottom: 10px; text-shadow: 0 0 30px var(--yellow);">🎁</div>
        <h1 style="font-size:45px; color:var(--yellow); margin-bottom: 10px;">БОНУС x10!</h1>
        <p style="opacity:0.8; margin-bottom: 30px; font-size: 18px;">Тапай якнайшвидше 7.5 секунд!</p>
        <button class="btn-ui" onclick="startBonusNow()" style="width:220px; font-size: 18px;">🔥 ПОЧАТИ</button>
        <p onclick="document.getElementById('bonus-win').style.display='none'" style="margin-top:25px; opacity:0.5; cursor:pointer;">Скасувати</p>
    </div>
    <div id="b-active" style="display:none; width: 100%;">
        <div id="b-timer" style="font-size:100px; font-weight:900; color:var(--yellow); text-shadow: 0 0 40px var(--yellow);">7.5</div>
        <div id="b-clicks" style="font-size:28px; font-weight: 700; margin-top: 10px;">КЛІКІВ: 0</div>
        <div id="bonus-click-zone" style="position:fixed; inset:0; z-index:100;"></div>
    </div>
</div>

<script>
    // ІНІЦІАЛІЗАЦІЯ БД
    const SB_URL = 'https://ohyagfbgaekifqrxvvks.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oeWFnZmJnYWVraWZxcnh2dmtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc2MzIsImV4cCI6MjA4OTUwMzYzMn0.VJhJcN3RaeJdZVsLKGU3NjLvCCdNTR5TA_Sp6jj1WKM';
    let db = null;
    try { if (typeof supabase !== 'undefined') db = supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

    let tg = window.Telegram.WebApp;
    let userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user_" + Math.floor(Math.random()*100);
    let userName = (tg.initDataUnsafe?.user?.first_name || "ГРАВЕЦЬ").toUpperCase();

    // СТЕЙТ
    let state = {
        score: 0, energy: 1000, max: 1000, power: 1, 
        totalEarned: 0, totalClicks: 0, totalSpent: 0, botLvl: 0,
        bonusLimit: 3, lastBonusDate: "", lastUpdate: Date.now(),
        critChance: 0.05,
        lvls: { tap: 1, energy: 1, bot: 0 },
        doneQuests: [], usedPromos: [], friendsList: []
    };

    let isB = false, bc = 0, bonusInterval;

    // ДОСЯГНЕННЯ
    const achievements = [
        { id: 'c100', n: 'Перша сотня кліків', b: 500, check: (s) => s.totalClicks >= 100 },
        { id: 'c1000', n: 'Майстер тапу (1к кліків)', b: 5000, check: (s) => s.totalClicks >= 1000 },
        { id: 'c5000', n: 'Легендарний клікер (5к кліків)', b: 25000, check: (s) => s.totalClicks >= 5000 },
        { id: 's5000', n: 'Інвестор (витрачено 5к)', b: 2000, check: (s) => s.totalSpent >= 5000 },
        { id: 'l5', n: 'Силач (тапу 5 рівня)', b: 3000, check: (s) => s.lvls.tap >= 5 },
        { id: 'b1', n: 'Власник бота', b: 1000, check: (s) => s.lvls.bot >= 1 },
        { id: 'e2000', n: 'Енерджайзер (2к енергії)', b: 4000, check: (s) => s.max >= 2000 },
        { id: 's1m', n: 'Мільйонер', b: 50000, check: (s) => s.score >= 1000000 }
    ];

    // ЗАВАНТАЖЕННЯ ДАНИХ
    async function loadData() {
        document.getElementById('username').innerText = userName;
        if (db) {
            try {
                const { data } = await db.from('players').select('state').eq('id', userId).maybeSingle();
                if (data?.state) {
                    state = { ...state, ...data.state, lvls: { ...state.lvls, ...data.state.lvls } };
                    if(!state.doneQuests) state.doneQuests = [];
                    if(!state.usedPromos) state.usedPromos = [];
                    if(!state.friendsList) state.friendsList = [];
                }
            } catch (e) { console.error("Помилка завантаження", e); }
        }
        
        // ОФЛАЙН ПРОГРЕС
        let now = Date.now();
        if(state.lastUpdate) {
            let diffSec = Math.floor((now - state.lastUpdate) / 1000);
            if(diffSec > 0) {
                state.energy = Math.min(state.max, state.energy + (diffSec * 2));
                if(state.lvls.bot > 0) {
                    let offlineCoins = diffSec * (state.lvls.bot * 2);
                    if(diffSec > 43200) offlineCoins = 43200 * (state.lvls.bot * 2); // Макс 12 годин
                    if(offlineCoins > 0) {
                        state.score += offlineCoins; state.totalEarned += offlineCoins;
                        setTimeout(() => tg.showAlert(`🤖 Твій бот заробив офлайн: +${offlineCoins.toLocaleString()} монет!`), 500);
                    }
                }
            }
        }
        state.lastUpdate = now;
        updateUI();
    }

    // ЗБЕРЕЖЕННЯ
    async function saveData() {
        if (!db) return;
        state.lastUpdate = Date.now();
        try { await db.from('players').upsert({ id: userId, username: userName, state: state, score_top: Math.floor(state.score) }); } catch(e) {}
    }

    // ОНОВЛЕННЯ ІНТЕРФЕЙСУ (ВСІ СТОРІНКИ)
    function updateUI() {
        // Ліміт бонусів (щодня)
        const today = new Date().toLocaleDateString();
        if(state.lastBonusDate !== today) { state.bonusLimit = 3; state.lastBonusDate = today; }

        // Головна
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-txt').innerText = `${Math.floor(state.energy)}/${state.max}`;
        document.getElementById('bar-fill').style.width = (state.energy/state.max)*100 + "%";
        document.getElementById('b-limit').innerText = state.bonusLimit;

        // Магазин
        const items = [{ id: 'tap', n: 'Сила тапу', b: 100 }, { id: 'energy', n: 'Енергія', b: 200 }, { id: 'bot', n: 'Авто-бот', b: 1500 }];
        document.getElementById('shop-list').innerHTML = items.map(i => {
            const cost = Math.floor(i.b * Math.pow(1.6, state.lvls[i.id]));
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b style="font-size:16px;">${i.n}</b><br><small style="opacity:0.6">Рівень: ${state.lvls[i.id]}</small></div>
                <button class="btn-ui" onclick="buy('${i.id}', ${cost})" ${state.score < cost ? 'disabled' : ''}>💰 ${cost.toLocaleString()}</button>
            </div>`;
        }).join('');

        // Друзі
        document.getElementById('friends-count').innerText = state.friendsList.length;
        if(state.friendsList.length === 0) {
            document.getElementById('friends-list').innerHTML = `<div style="text-align:center; opacity:0.5; padding: 20px;">Ще немає запрошених друзів</div>`;
        } else {
            document.getElementById('friends-list').innerHTML = state.friendsList.map(f => `
                <div class="friend-item">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--yellow); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold;">${f.name.charAt(0)}</div>
                    <div style="flex:1;"><b>${f.name}</b><br><small style="color:var(--yellow);">+${f.reward.toLocaleString()}</small></div>
                </div>
            `).join('');
        }

        // Досягнення (Квести)
        document.getElementById('quest-list').innerHTML = achievements.map(a => {
            const isDone = state.doneQuests.includes(a.id);
            const canClaim = a.check(state) && !isDone;
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center; opacity:${isDone?0.4:1}; padding: 15px;">
                <div style="flex:1; padding-right:10px;">
                    <b style="font-size:14px;">${a.n}</b><br>
                    <small style="color:var(--yellow); font-weight:bold;">+${a.b.toLocaleString()}</small>
                </div>
                <button class="btn-ui" onclick="claimAchive('${a.id}', ${a.b})" ${!canClaim?'disabled':''} style="font-size:12px; padding: 10px;">
                    ${isDone ? '✓' : canClaim ? 'ОТРИМАТИ' : 'В ПРОЦЕСІ'}
                </button>
            </div>`;
        }).join('');

        // Статистика
        const st = [
            ["Поточний баланс", state.score], ["Всього зароблено", state.totalEarned], 
            ["Витрачено монет", state.totalSpent], ["Сила 1 тапу", state.power],
            ["Всього кліків", state.totalClicks], ["Шанс крит. удару", (state.critChance*100) + "%"],
            ["Рівень Авто-бота", state.lvls.bot]
        ];
        document.getElementById('stat-list').innerHTML = st.map(s => 
            `<div class="card" style="display:flex; justify-content:space-between; padding: 18px 20px;">
                <span style="opacity:0.8">${s[0]}</span>
                <b style="color:var(--yellow); font-size:16px;">${typeof s[1] === 'number' ? Math.floor(s[1]).toLocaleString() : s[1]}</b>
            </div>`
        ).join('');
    }

    // ТАПИ ТА КЛІКИ
    function handleTap(e) {
        if(isB) return;
        if(e.type === 'touchstart') e.preventDefault();
        const pts = e.touches ? Array.from(e.touches) : [{clientX: e.clientX, clientY: e.clientY}];
        pts.forEach(p => {
            if(state.energy >= 1) {
                let isCrit = Math.random() < state.critChance;
                let val = state.power * (isCrit ? 5 : 1);
                
                state.score += val; state.totalEarned += val; 
                state.totalClicks++; state.energy--;
                
                const d = document.createElement('div');
                d.className = 'tap-pop'; d.innerText = `+${val}`;
                if(isCrit) { d.style.color = "var(--crit)"; d.style.fontSize = "45px"; d.innerText = "🔥+"+val; }
                d.style.left = p.clientX + 'px'; d.style.top = p.clientY + 'px';
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 800);
                
                tg.HapticFeedback.impactOccurred(isCrit ? 'heavy' : 'light');
            }
        });
        updateUI();
    }

    // ПОКУПКИ
    function buy(id, cost) {
        if(state.score >= cost) {
            state.score -= cost; state.totalSpent += cost; state.lvls[id]++;
            if(id==='tap') state.power++; 
            if(id==='energy') state.max += 500;
            if(id==='bot') state.botLvl++;
            updateUI(); saveData();
            tg.HapticFeedback.notificationOccurred('success');
        }
    }

    // ЗБІР НАГОРОД ЗА ДОСЯГНЕННЯ
    function claimAchive(id, reward) {
        if(!state.doneQuests.includes(id)) {
            state.doneQuests.push(id);
            state.score += reward; state.totalEarned += reward;
            updateUI(); saveData();
            tg.showAlert(`✅ Нагороду отримано: ${reward.toLocaleString()} монет!`);
        }
    }

    // ПРОМОКОДИ
    function openPromo() { document.getElementById('promo-modal').style.display = 'flex'; }
    function checkPromo() {
        const input = document.getElementById('promo-input').value.trim();
        if(state.usedPromos.includes(input)) { tg.showAlert("❌ Цей код вже активовано!"); return; }

        if(input === "B3RDO$") {
            state.score += 5757; state.totalEarned += 5757; state.usedPromos.push(input);
            tg.showAlert("✅ Успішно! Отримано 5757 монет.");
        } else if(input === "saRAt@") {
            state.critChance = 0.25; state.usedPromos.push(input);
            tg.showAlert("🔥 Успішно! Шанс криту збільшено до 25%!");
        } else {
            tg.showAlert("❌ Невірний код.");
            return;
        }
        updateUI(); saveData(); document.getElementById('promo-modal').style.display = 'none';
    }

    // ДРУЗІ
    function inviteFriend() {
        const link = `https://t.me/raccoon_coin_tap_bot/RACCOON_TAP_APP?startapp=${userId}`;
        tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=🚀 Грай в Raccoon Coin!`);
        // Імітація для тесту (через 3 сек додасть друга)
        setTimeout(() => {
            if(state.friendsList.length < 5) {
                const names = ["Саня", "Ірина", "Дмитро", "Олег", "Марія"];
                state.friendsList.push({ name: names[state.friendsList.length], reward: 10000 });
                state.score += 10000; state.totalEarned += 10000;
                updateUI(); saveData();
            }
        }, 3000);
    }

    // БОНУСНА ГРА
    function openBonus() { if(state.bonusLimit > 0) document.getElementById('bonus-win').style.display = 'flex'; }
    function startBonusNow() {
        bc = 0; isB = true;
        document.getElementById('b-ready').style.display = 'none';
        document.getElementById('b-active').style.display = 'block';
        let start = performance.now();
        bonusInterval = setInterval(() => {
            let left = Math.max(0, 7.5 - (performance.now() - start) / 1000);
            document.getElementById('b-timer').innerText = left.toFixed(1);
            if(left <= 0) { clearInterval(bonusInterval); finishBonus(); }
        }, 50);
    }
    function finishBonus() {
        isB = false;
        let win = bc * state.power * 10;
        state.score += win; state.totalEarned += win; state.bonusLimit--;
        document.getElementById('b-ready').style.display = 'block';
        document.getElementById('b-active').style.display = 'none';
        document.getElementById('bonus-win').style.display = 'none';
        updateUI(); saveData();
        tg.showAlert(`🔥 Бонус завершено!\nКліків: ${bc}.\nОтримано: ${win.toLocaleString()} монет.`);
    }

    // ТОП 10
    async function openTop() {
        document.getElementById('top-modal').style.display = 'flex';
        const container = document.getElementById('top-content');
        container.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:30px;'>Шукаю чемпіонів...</p>";
        if(!db) return;
        try {
            const { data } = await db.from('players').select('username, score_top').order('score_top', {ascending: false}).limit(10);
            if(data && data.length > 0) {
                container.innerHTML = data.map((p, i) => `
                    <div class="top-item">
                        <span style="width:25px; color:var(--yellow); font-weight:900;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
                        <span style="flex:1; font-weight:bold;">${p.username}</span>
                        <b style="color:var(--yellow)">${Math.floor(p.score_top).toLocaleString()}</b>
                    </div>
                `).join('');
            } else { container.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:30px;'>Тут поки пусто.</p>"; }
        } catch(e) { container.innerHTML = "<p style='text-align:center; color:var(--crit); margin-top:30px;'>Помилка підключення</p>"; }
    }

    // НАВІГАЦІЯ
    function nav(idx) {
        tg.HapticFeedback.impactOccurred('light');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`p${idx}`).classList.add('active');
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
        document.getElementById('capsule').style.left = (idx * 20) + "%";
    }

    // ІВЕНТИ КЛІКІВ
    document.getElementById('coin').addEventListener('touchstart', handleTap, {passive: false});
    document.getElementById('coin').addEventListener('mousedown', handleTap);
    
    const bZone = document.getElementById('bonus-click-zone');
    bZone.addEventListener('touchstart', (e) => { e.preventDefault(); bc++; document.getElementById('b-clicks').innerText = `КЛІКІВ: ${bc}`; tg.HapticFeedback.impactOccurred('medium'); }, {passive: false});
    bZone.addEventListener('mousedown', () => { bc++; document.getElementById('b-clicks').innerText = `КЛІКІВ: ${bc}`; });

    // ЦИКЛИ
    setInterval(() => {
        state.lastUpdate = Date.now();
        if(state.energy < state.max) state.energy = Math.min(state.max, state.energy + 2);
        if(state.lvls.bot > 0) {
            let inc = state.lvls.bot * 2;
            state.score += inc; state.totalEarned += inc;
        }
        updateUI();
    }, 1000);

    setInterval(saveData, 10000); // Збереження в базу кожні 10 сек

    loadData();
    tg.expand();
</script>
</body>
</html>
