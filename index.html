<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Raccoon Coin: Money Rain</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --yellow: #fde047; --crit: #ff3b30; --gray: #2d2d2d;
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; height: 100dvh; overflow: hidden; display: flex; justify-content: center; }

        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* HEADER */
        .header-tools { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; align-items: center; z-index: 100; }
        
        /* NAV */
        nav { position: absolute; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(15, 15, 15, 0.8); border-top: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-grid { display: flex; height: 100%; position: relative; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.3; transition: 0.3s; }
        .nav-item.active { opacity: 1; }
        .nav-item img { width: 26px; height: 26px; }
        .capsule { position: absolute; width: 20%; height: 55px; top: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 20px; transition: 0.4s cubic-bezier(0.18, 0.9, 0.3, 1.1); }

        /* PAGES */
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; scrollbar-width: none; }
        .page { display: none; flex-direction: column; padding: 20px; animation: pageIn 0.3s ease-out; }
        .page.active { display: flex; }
        @keyframes pageIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        #score { font-size: 56px; font-weight: 900; color: var(--yellow); text-align: center; margin: 45px 0 10px; }
        .coin-box { flex: 1; display: flex; align-items: center; justify-content: center; }
        .coin-img { width: 75vw; max-width: 280px; transition: 0.05s; cursor: pointer; }
        .coin-img:active { transform: scale(0.9); }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 18px; margin-bottom: 12px; }
        .btn-ui { background: var(--yellow); color: #000; border: none; padding: 12px 20px; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .btn-ui:disabled { background: var(--gray) !important; color: #666 !important; opacity: 0.8; }

        /* MONEY RAIN GAME AREA */
        #rain-zone { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; overflow: hidden; }
        .falling-coin { position: absolute; width: 50px; height: 50px; cursor: pointer; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110dvh); } }

        #rain-ui { position: absolute; top: 40px; width: 100%; text-align: center; pointer-events: none; z-index: 5100; }
        #rain-timer { font-size: 60px; font-weight: 900; color: var(--yellow); }
        #rain-counter { font-size: 24px; opacity: 0.8; }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: none; flex-direction: column; padding: 40px 20px; backdrop-filter: blur(20px); }
        .top-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 18px; margin-bottom: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="app">
    <div class="header-tools">
        <img src="https://i.ibb.co/dwcQhshq/top-arrow-1f51d.png" style="width:34px; cursor:pointer;" onclick="openTop()">
        <div onclick="openRainStart()" style="position:relative; cursor:pointer; font-size:32px;">
            🎁 <small id="rain-limit" style="position:absolute; top:-5px; right:-5px; background:var(--crit); color:white; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:900;">4</small>
        </div>
    </div>

    <div class="content">
        <div class="page active" id="p0">
            <div style="margin-top:20px; opacity:0.5; font-size:11px; text-align:center;" id="username">ЗАВАНТАЖЕННЯ...</div>
            <div id="score">0</div>
            <div class="coin-box">
                <img id="coin" class="coin-img" src="https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png">
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:900; margin-bottom:8px;">
                    <span>⚡ ЕНЕРГІЯ</span> <span id="energy-txt">1000/1000</span>
                </div>
                <div style="width:100%; height:8px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden;">
                    <div id="bar-fill" style="height:100%; background:var(--yellow); width:100%; transition:0.3s;"></div>
                </div>
            </div>
        </div>

        <div class="page" id="p1"><h2 style="margin-bottom:20px;">Магазин</h2><div id="shop-list"></div></div>
        <div class="page" id="p2">
            <h2 style="margin-bottom:20px;">Друзі</h2>
            <div class="card" style="text-align:center;">
                <p style="margin-bottom:15px; opacity:0.8;">Запроси друга та отримай 10,000 монет!</p>
                <button class="btn-ui" onclick="inviteFriend()" style="width:100%;">🚀 ЗАПРОСИТИ</button>
            </div>
        </div>
        <div class="page" id="p3"><h2 style="margin-bottom:20px;">Квести</h2><div id="quest-list"></div></div>
        <div class="page" id="p4"><h2 style="margin-bottom:20px;">Статистика</h2><div id="stat-list"></div></div>
    </div>

    <nav>
        <div class="nav-grid">
            <div id="capsule" class="capsule"></div>
            <div class="nav-item active" onclick="nav(0)"><img src="https://i.ibb.co/chM9Ftgt/retouch-2026031610215594.png"></div>
            <div class="nav-item" onclick="nav(1)"><img src="https://i.ibb.co/xtM6BCyd/shopping-cart-1f6d2.png"></div>
            <div class="nav-item" onclick="nav(2)"><img src="https://i.ibb.co/mCWNRzgf/busts-in-silhouette-1f465.png"></div>
            <div class="nav-item" onclick="nav(3)"><img src="https://i.ibb.co/6ctcw0gn/trophy-1f3c6.png"></div>
            <div class="nav-item" onclick="nav(4)"><img src="https://i.ibb.co/wrZK79M8/bar-chart-1f4ca.png"></div>
        </div>
    </nav>
</div>

<div id="rain-zone">
    <div id="rain-ui">
        <div id="rain-timer">10</div>
        <div id="rain-counter">ЗІБРАНО: 0</div>
    </div>
</div>

<div id="top-modal" class="modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h2 style="color:var(--yellow)">ТОП ГРАВЦІВ</h2>
        <b onclick="closeTop()" style="font-size:24px; cursor:pointer;">✕</b>
    </div>
    <div id="top-content"></div>
</div>

<script>
    const SB_URL = 'https://ohyagfbgaekifqrxvvks.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oeWFnZmJnYWVraWZxcnh2dmtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc2MzIsImV4cCI6MjA4OTUwMzYzMn0.VJhJcN3RaeJdZVsLKGU3NjLvCCdNTR5TA_Sp6jj1WKM';
    const db = supabase.createClient(SB_URL, SB_KEY);

    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe?.user?.id.toString() || "dev_user";
    const userName = (tg.initDataUnsafe?.user?.first_name || "ГРАВЕЦЬ").toUpperCase();

    let state = {
        score: 0, energy: 1000, max: 1000, power: 1,
        rainGames: 4, lastRainDate: "",
        totalEarned: 0, lvls: { tap: 1, energy: 1, bot: 0 },
        doneQuests: []
    };

    let caughtInRain = 0;
    let rainInterval;

    async function loadData() {
        const { data } = await db.from('players').select('state').eq('id', userId).maybeSingle();
        if(data) state = Object.assign(state, data.state);
        checkRainReset();
        updateUI();
    }

    function checkRainReset() {
        const now = new Date().toLocaleDateString();
        if(state.lastRainDate !== now) {
            state.rainGames = 4;
            state.lastRainDate = now;
        }
    }

    async function saveData() {
        await db.from('players').upsert({ id: userId, username: userName, state: state, score_top: Math.floor(state.score) });
    }

    function updateUI() {
        document.getElementById('username').innerText = userName;
        document.getElementById('score').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('energy-txt').innerText = `${Math.floor(state.energy)}/${state.max}`;
        document.getElementById('bar-fill').style.width = (state.energy/state.max)*100 + "%";
        document.getElementById('rain-limit').innerText = state.rainGames;

        const shopItems = [
            { id: 'tap', n: 'Мульти-клік', b: 100 },
            { id: 'energy', n: 'Енергетик', b: 200 }
        ];
        document.getElementById('shop-list').innerHTML = shopItems.map(i => {
            const cost = Math.floor(i.b * Math.pow(1.5, state.lvls[i.id]));
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${i.n}</b><br><small>Рівень ${state.lvls[i.id]}</small></div>
                <button class="btn-ui" onclick="buy('${i.id}', ${cost})" ${state.score < cost ? 'disabled' : ''}>💰 ${cost}</button>
            </div>`;
        }).join('');
    }

    // ГРОШОВИЙ ДОЩ
    function openRainStart() {
        if(state.rainGames <= 0) {
            tg.showAlert("Приходь завтра! Ігри закінчились.");
            return;
        }
        startMoneyRain();
    }

    function startMoneyRain() {
        state.rainGames--;
        caughtInRain = 0;
        document.getElementById('rain-zone').style.display = 'block';
        document.getElementById('rain-counter').innerText = `ЗІБРАНО: 0`;
        
        let timeLeft = 10;
        document.getElementById('rain-timer').innerText = timeLeft;

        // Поява монет
        rainInterval = setInterval(() => {
            createFallingCoin();
        }, 350);

        // Таймер
        const timerItv = setInterval(() => {
            timeLeft--;
            document.getElementById('rain-timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerItv);
                clearInterval(rainInterval);
                finishRain();
            }
        }, 1000);
    }

    function createFallingCoin() {
        const coin = document.createElement('img');
        coin.src = "https://i.ibb.co/fYzVqbLB/file-00000000cb70720a92f5b0192d2b39a4.png";
        coin.className = 'falling-coin';
        
        const x = Math.random() * (window.innerWidth - 60);
        coin.style.left = x + 'px';
        coin.style.top = '-60px';
        
        const duration = 1.5 + Math.random(); // Швидкість падіння
        coin.style.animationDuration = duration + 's';

        coin.onclick = (e) => {
            e.stopPropagation();
            caughtInRain++;
            document.getElementById('rain-counter').innerText = `ЗІБРАНО: ${caughtInRain}`;
            coin.remove();
        };

        document.getElementById('rain-zone').appendChild(coin);
        setTimeout(() => coin.remove(), duration * 1000);
    }

    function finishRain() {
        const win = caughtInRain * 5;
        state.score += win;
        state.totalEarned += win;
        document.getElementById('rain-zone').style.display = 'none';
        tg.showAlert(`Дощ закінчився! Ти впіймав ${caughtInRain} монет. Твій приз: +${win} очок!`);
        updateUI();
        saveData();
    }

    // СТАНДАРТНИЙ ТАП
    document.getElementById('coin').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(state.energy >= 1) {
            state.score += state.power;
            state.energy--;
            updateUI();
        }
    }, {passive: false});

    async function openTop() {
        document.getElementById('top-modal').style.display = 'flex';
        const { data } = await db.from('players').select('username, score_top').order('score_top', {ascending: false}).limit(10);
        document.getElementById('top-content').innerHTML = (data || []).map((p, i) => `
            <div class="top-item">
                <b style="color:var(--yellow)">#${i+1}</b>
                <span style="flex:1; margin-left:10px;">${p.username}</span>
                <b>${Math.floor(p.score_top).toLocaleString()}</b>
            </div>
        `).join('') || "Поки порожньо...";
    }

    function closeTop() { document.getElementById('top-modal').style.display = 'none'; }
    function nav(idx) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`p${idx}`).classList.add('active');
        document.getElementById('capsule').style.transform = `translateX(${idx * 100}%)`;
    }

    setInterval(() => {
        if(state.energy < state.max) state.energy = Math.min(state.max, state.energy + 2);
        updateUI();
    }, 1000);

    loadData();
    setInterval(saveData, 15000);
</script>
</body>
</html>
